x-ollama-common: &ollama-common
  restart: unless-stopped
  tty: true
  ports:
    - "${OLLAMA_WEBAPI_PORT:-11434}:11434"
  volumes:
    - ollama:/root/.ollama
  healthcheck:
    test: ["CMD-SHELL", "OLLAMA_HOST=http://localhost:11434 ollama list >/dev/null 2>&1 || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 30

x-openwebui-common: &openwebui-common
  restart: unless-stopped
  ports:
    - "${OPEN_WEBUI_PORT:-3000}:8080"
  environment:
    - WEBUI_SECRET_KEY=
  volumes:
    - open-webui:/app/backend/data
  extra_hosts:
    - host.docker.internal:host-gateway

# ---------- NVIDIA profile ----------
services:
  ollama-nvidia:
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    container_name: ollama-nvidia
    restart: unless-stopped
    tty: true

    # Correct GPU passthrough for Docker Compose
    gpus: all

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "${OLLAMA_WEBAPI_PORT:-11434}:11434"

    volumes:
      - ollama:/root/.ollama

    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://localhost:11434 ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s

  ollama-init-nvidia:
    profiles: ["nvidia"]
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    depends_on:
      ollama-nvidia:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama-nvidia:11434
    volumes:
      - ollama:/root/.ollama
      - ./scripts:/opt/init:ro
    entrypoint: ["/bin/bash", "-lc", "/opt/init/pull-ollama-models.sh"]
    restart: "no"

  open-webui-nvidia:
    <<: *openwebui-common
    profiles: ["nvidia"]
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    depends_on:
      ollama-nvidia:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama-nvidia:11434

# ---------- AMD ROCm profile ----------
  ollama-amd:
    <<: *ollama-common
    profiles: ["amd"]
    image: ollama/ollama:${OLLAMA_ROCM_TAG:-rocm}   # Use ROCm build for AMD GPUs   # [1](https://docs.ollama.com/docker)
    devices:
      - /dev/kfd                                 # ROCm compute interface           # [2](https://rocm.docs.amd.com/projects/install-on-linux/en/latest/how-to/docker.html)
      - /dev/dri                                 # DRI nodes for each GPU           # [2](https://rocm.docs.amd.com/projects/install-on-linux/en/latest/how-to/docker.html)
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    security_opt:
      - seccomp=unconfined                       # Recommended in ROCm container guide (optional)   # [2](https://rocm.docs.amd.com/projects/install-on-linux/en/latest/how-to/docker.html)
    # If you have a known RDNA/GCN override (rarely needed), uncomment and set:
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=10.3.0

  ollama-init-amd:
    profiles: ["amd"]
    image: ollama/ollama:${OLLAMA_ROCM_TAG:-rocm}
    depends_on:
      ollama-amd:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama-amd:11434
      # - CODING_MODELS=llama3.1:8b-instruct-q4_K_M qwen2.5-coder:7b-instruct-q4_K_M
    volumes:
      - ollama:/root/.ollama
      - ./scripts:/opt/init:ro
    entrypoint: ["/bin/bash", "-lc", "/opt/init/pull-ollama-models.sh"]
    restart: "no"

  open-webui-amd:
    <<: *openwebui-common
    profiles: ["amd"]
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    depends_on:
      ollama-amd:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama-amd:11434

# ---------- Vulkan fallback profile (AMD/Intel capable) ----------
  ollama-vulkan:
    <<: *ollama-common
    profiles: ["vulkan"]
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    environment:
      - OLLAMA_VULKAN=1                         # Enable Vulkan backend in default image  # [1](https://docs.ollama.com/docker)
    devices:
      - /dev/dri

  ollama-init-vulkan:
    profiles: ["vulkan"]
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    depends_on:
      ollama-vulkan:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama-vulkan:11434
    volumes:
      - ollama:/root/.ollama
      - ./scripts:/opt/init:ro
    entrypoint: ["/bin/bash", "-lc", "/opt/init/pull-ollama-models.sh"]
    restart: "no"

  open-webui-vulkan:
    <<: *openwebui-common
    profiles: ["vulkan"]
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    depends_on:
      ollama-vulkan:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama-vulkan:11434

# ---------- CPU-only profile ----------
  ollama-cpu:
    <<: *ollama-common
    profiles: ["cpu"]
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}

  ollama-init-cpu:
    profiles: ["cpu"]
    image: ollama/ollama:${OLLAMA_DOCKER_TAG:-latest}
    depends_on:
      ollama-cpu:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama-cpu:11434
    volumes:
      - ollama:/root/.ollama
      - ./scripts:/opt/init:ro
    entrypoint: ["/bin/bash", "-lc", "/opt/init/pull-ollama-models.sh"]
    restart: "no"

  open-webui-cpu:
    <<: *openwebui-common
    profiles: ["cpu"]
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG:-main}
    depends_on:
      ollama-cpu:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama-cpu:11434

volumes:
  ollama: {}
  open-webui: {}
